<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V-Phone | Home</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      height: 100%;
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background-color: #FFEBEC;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      z-index: 1000;
      background: linear-gradient(to bottom, #4e2e2d, #FFEBEC);
    }
    .header-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to bottom, #D7A7AA, #4e2e2d);
      border-radius: 0 0 10px 10px;
      transition: opacity 0.3s ease;
      opacity: 0;
      z-index: -1;
    }
    .header-bg.show {
      opacity: 1;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      color: white;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      z-index: 10;
    }
    nav {
      position: relative;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
      z-index: 10;
    }
    .nav-links a {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
      cursor: pointer;
      display: block;
    }
    .nav-links a.active {
      background-color: rgba(93, 52, 55, 0.474);
      font-weight: 700;
      text-decoration: underline;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.5);
      border-radius: 8px;
    }
    .nav-links a:hover {
      background-color: rgba(255, 255, 255, 0.2);
      font-weight: 700;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 2.2rem;
      cursor: pointer;
      z-index: 20;
    }
    main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; padding-top: 100px; }
    .register-container { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: left; }
    .register-container h2 { text-align: center; color: #AC8083; margin-bottom: 1.5rem; font-size: 1.8rem; font-weight: bold; }
    .register-form { display: flex; flex-direction: column; }
    .register-form label { font-weight: bold; color: #555; margin-bottom: 5px; }
    .register-form input { padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; }
    .register-form button { background-color: #AC8083; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: background 0.3s; }
    .register-form button:hover { background-color: #4e2e2d; }
    footer {
      padding: 40px;
      background: linear-gradient(to bottom, #AC8083, #4e2e2d);
      color: white;
      margin-top: auto;
    }
    .footer-content {
      display: flex;
      gap: 30px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto;
    }
    .footer-section {
      flex: 1;
      min-width: 220px;
    }
    .footer-section h3 {
      margin-bottom: 0.75rem;
      font-size: 1.2rem;
      color: #fff;
    }
    .footer-section p, .footer-section a {
      color: #f0f0f0;
      font-size: 0.95rem;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5rem;
    }
    .footer-bottom {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 1rem;
    }
    @media (max-width: 768px) {
      .nav-toggle { display: block; }
      .nav-links {
        flex-direction: column;
        background-color: #AC8083;
        position: absolute;
        top: 80px;
        right: 0;
        width: 200px;
        border-radius: 0 0 0 10px;
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.3s ease-out;
      }
      .nav-links.show { max-height: 500px; transition: max-height 0.5s ease-in; }
      .nav-links li a { display: block; padding: 15px 20px; }
      .features, .products { flex-direction: column; align-items: center; }
      .footer-content { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="logo">V-Phone</div>
      <nav>
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <ul class="nav-links">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="promotion.html">Promotion</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <section class="register-container">
      <h2>Create Your Account</h2>
      <form action="#" method="POST" class="register-form" onsubmit="event.preventDefault(); alert('Registration successful!');">
        <label>Full Name</label><input type="text" placeholder="Your full name" required />
        <label>Email Address</label><input type="email" placeholder="you@example.com" required />
        <label>Password</label><input type="password" placeholder="Choose a strong password" required />
        <label>Confirm Password</label><input type="password" placeholder="Repeat your password" required />
        <button type="submit">Register</button>
      </form>
    </section>
  </main>
  <footer>
    <div class="footer-content">
      <div class="footer-section"><h3>V-Phone</h3><p>Leading Innovation, Shaping the Future</p></div>
      <div class="footer-section"><h3>Quick Links</h3><a href="products.html">Products</a><a href="promotion.html">Promotion</a><a href="about.html">About Us</a><a href="register.html">Register</a></div>
      <div class="footer-section"><h3>Contact</h3><p>Email: support@vphone.com</p><p>Phone: (021) 1234-5678</p></div>
    </div>
    <div class="footer-bottom">© 2025 V-Phone. All rights reserved.</div>
  </footer>
  <script>
    const headerBg = document.querySelector('.header-bg');
    window.addEventListener('scroll', () => { if (window.scrollY > 100) { headerBg.classList.add('show'); } else { headerBg.classList.remove('show'); } });

    document.addEventListener('DOMContentLoaded', () => {
      const navToggle = document.querySelector('.nav-toggle');
      const navLinks = document.querySelector('.nav-links');
      if(navToggle && navLinks) {
        navToggle.addEventListener('click', () => { navLinks.classList.toggle('show'); });
      }
    });
  </script>
</body>
</html>
