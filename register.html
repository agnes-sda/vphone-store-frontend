<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V-Phone | Register</title>
  <link rel="stylesheet" href="register.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
</head>
<body>
  <header>
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="logo">V-Phone</div>
      <nav>
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="promotion.html">Promotion</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="register-container">
    <div class="register-card">
      <h2>Create Your Account</h2>
      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Choose a strong password" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" required />
        </div>
        <button type="submit" class="register-btn">Register</button>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-section footer-left">
        <h3>V-Phone</h3>
        <p>Leading Innovation, Shaping the Future</p>
      </div>
      <div class="footer-section footer-center">
        <h3>Quick Links</h3>
        <a href="products.html">Products</a>
        <a href="promotion.html">Promotion</a>
        <a href="about.html">About Us</a>
        <a href="register.html">Register</a>
      </div>
      <div class="footer-section footer-right">
        <h3>Contact</h3>
        <p>Email: support@vphone.com</p>
        <p>Phone: (021) 1234-5678</p>
      </div>
    </div>
    <div class="footer-bottom">© 2025 V-Phone. All rights reserved.</div>
  </footer>
  <script src="register.js"></script>
</body>
</html>
