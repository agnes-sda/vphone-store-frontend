<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V-Phone | Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background-color: #FFEBEC;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      z-index: 1000;
      background: linear-gradient(to bottom, #4e2e2d, #FFEBEC);
    }
    .header-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to bottom, #D7A7AA, #4e2e2d);
      border-radius: 0 0 10px 10px;
      transition: opacity 0.3s ease;
      opacity: 0;
      z-index: -1;
    }
    .header-bg.show { opacity: 1; }
    .header-content { display: flex; justify-content: space-between; align-items: center; width: 100%; color: white; }
    .logo { font-size: 2rem; font-weight: bold; z-index: 10; }
    .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; z-index: 10; }
    .nav-links a { color: #fff; font-weight: 600; text-decoration: none; padding: 10px 20px; border-radius: 5px; }
    .nav-links a.active { background-color: rgba(93, 52, 55, 0.474); font-weight: 700; text-decoration: underline; box-shadow: 0 4px 10px rgba(255, 255, 255, 0.5); border-radius: 8px; }
    .nav-links a:hover { background-color: rgba(255, 255, 255, 0.2); font-weight: 700; }
    .nav-toggle { display: none; background: none; border: none; color: white; font-size: 2.2rem; cursor: pointer; z-index: 20; }
    main { flex: 1; padding: 2rem; padding-top: 80px; }
    .filter-section h2 { text-align: center; color: #AC8083; font-weight: bold; margin-bottom: 1rem; font-size: 2rem; }
    .filters { text-align: center; margin-bottom: 2rem; }
    .filters button { background-color: #C3989C; color: white; border: none; padding: 0.7rem 1.2rem; margin: 0.5rem; cursor: pointer; border-radius: 10px; font-size: 1rem; transition: transform 0.2s ease; }
    .filters button.active, .filters button:hover { transform: scale(1.05); background-color: #ac7b80; }
    .product-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; justify-items: center; }
    .product-list.centered { display: flex; justify-content: center; flex-wrap: wrap; gap: 2rem; }
    .product { background-color: white; padding: 1rem; border-radius: 15px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); text-align: center; transition: transform 0.3s ease; width: 100%; max-width: 300px; box-sizing: border-box; }
    .product:hover { transform: translateY(-5px); }
    .product img { width: 100%; height: 200px; border-radius: 10px; margin-bottom: 1rem; object-fit: contain; background-color: #fff; }
    .buy-btn { margin-top: 1rem; padding: 0.6rem 1rem; background-color: #C3989C; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 8px; transition: background-color 0.3s ease; }
    .buy-btn:hover { background-color: #561e22; }
    footer { padding: 40px; background: linear-gradient(to bottom, #AC8083, #4e2e2d); color: white; }
    .footer-content { display: flex; gap: 30px; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; }
    .footer-section { flex: 1; min-width: 200px; }
    .footer-section h3 { margin-bottom: 0.75rem; font-size: 1.2rem; color: #fff; }
    .footer-section p, .footer-section a { color: #f0f0f0; font-size: 0.95rem; text-decoration: none; display: block; margin-bottom: 0.5rem; }
    .footer-bottom { text-align: center; margin-top: 2rem; font-size: 0.85rem; border-top: 1px solid rgba(255, 255, 255, 0.2); padding-top: 1rem; }
    @media (max-width: 768px) {
      .nav-toggle { display: block; }
      .nav-links { flex-direction: column; background-color: #AC8083; position: absolute; top: 80px; right: 0; width: 200px; border-radius: 0 0 0 10px; overflow: hidden; max-height: 0; transition: max-height 0.3s ease-out; }
      .nav-links.show { max-height: 500px; }
      .nav-links li a { display: block; padding: 15px 20px; }
      .product-list { grid-template-columns: repeat(2, 1fr); }
      .footer-content { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="logo">V-Phone</div>
      <nav>
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html" class="active">Products</a></li>
          <li><a href="promotion.html">Promotion</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <section class="filter-section">
      <h2>Filter Products</h2>
      <div class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="gaming">Gaming</button>
        <button data-filter="camera">Camera</button>
        <button data-filter="budget">Budget</button>
      </div>
    </section>
    <section class="product-list" id="product-list"></section>
  </main>
  <footer>
    <div class="footer-content">
      <div class="footer-section"><h3>V-Phone</h3><p>Leading Innovation, Shaping the Future</p></div>
      <div class="footer-section"><h3>Quick Links</h3><a href="products.html">Products</a><a href="promotion.html">Promotion</a><a href="about.html">About Us</a><a href="register.html">Register</a></div>
      <div class="footer-section"><h3>Contact</h3><p>Email: support@vphone.com</p><p>Phone: (021) 1234-5678</p></div>
    </div>
    <div class="footer-bottom">© 2025 V-Phone. All rights reserved.</div>
  </footer>
  <script>
    const products = [
      { id: 1, name: 'V-Phone Z Pro', category: 'gaming', price: '1.500.000', image: 'image/phone-2.jpeg' },
      { id: 2, name: 'V-Camera Pro', category: 'camera', price: '3.500.000', image: 'image/camx.png' },
      { id: 3, name: 'V-Phone Lite', category: 'budget', price: '900.000', image: 'image/phone-4.png' },
      { id: 4, name: 'V-Phone G5', category: 'gaming', price: '1.200.000', image: 'image/phone-one.png' },
      { id: 5, name: 'V-Action Cam', category: 'camera', price: '3.200.000', image: 'image/action-cam.png' },
      { id: 6, name: 'V-Phone Max', category: 'budget', price: '4.000.000', image: 'image/phone-6.png' }
    ];
    const productList = document.getElementById('product-list');
    const filterButtons = document.querySelectorAll('.filters button');
    function displayProducts(filter) {
      productList.innerHTML = '';
      let filteredProducts = products;
      if (filter && filter !== 'all') { filteredProducts = products.filter(p => p.category === filter); }
      if (filteredProducts.length < 3) { productList.classList.add('centered'); } else { productList.classList.remove('centered'); }
      filteredProducts.forEach(product => {
        const productElem = document.createElement('article');
        productElem.classList.add('product');
        productElem.innerHTML = `
          <img src="${product.image}" alt="${product.name}" />
          <h3>${product.name}</h3>
          <p>Price: Rp. ${product.price}</p>
          <button onclick="window.location.href='register.html'" class="buy-btn">Buy Now</button>
        `;
        productList.appendChild(productElem);
      });
    }
    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        filterButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        displayProducts(button.getAttribute('data-filter'));
      });
    });
    displayProducts('all');
    const headerBg = document.querySelector('.header-bg');
    window.addEventListener('scroll', () => { if (window.scrollY > 100) { headerBg.classList.add('show'); } else { headerBg.classList.remove('show'); } });
    const navToggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    navToggle.addEventListener('click', () => { navLinks.classList.toggle('show'); });
  </script>
</body>
</html>
