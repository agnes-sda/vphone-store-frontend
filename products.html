<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V-Phone | Home</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      height: 100%;
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background-color: #FFEBEC;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      z-index: 1000;
      background: linear-gradient(to bottom, #4e2e2d, #FFEBEC);
    }
    .header-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to bottom, #D7A7AA, #4e2e2d);
      border-radius: 0 0 10px 10px;
      transition: opacity 0.3s ease;
      opacity: 0;
      z-index: -1;
    }
    .header-bg.show {
      opacity: 1;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      color: white;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      z-index: 10;
    }
    nav {
      position: relative;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
      z-index: 10;
    }
    .nav-links a {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
      cursor: pointer;
      display: block;
    }
    .nav-links a.active {
      background-color: rgba(93, 52, 55, 0.474);
      font-weight: 700;
      text-decoration: underline;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.5);
      border-radius: 8px;
    }
    .nav-links a:hover {
      background-color: rgba(255, 255, 255, 0.2);
      font-weight: 700;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 2.2rem;
      cursor: pointer;
      z-index: 20;
    }
    main {
      flex: 1;
      padding: 2rem;
      padding-top: 100px;
    }
    .filter-section {
      text-align: center;
      margin-bottom: 2rem;
    }
    .filter-section h2 {
      font-size: 2rem;
      color: #AC8083;
      margin-bottom: 1rem;
    }
    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filters button {
      padding: 0.5rem 1.5rem;
      background-color: #C3989C;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 20px;
      transition: background-color 0.3s ease;
    }
    .filters button.active, .filters button:hover {
      background-color: #561e22;
    }
    .product-list {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    .product {
      background-color: white;
      border-radius: 15px;
      padding: 1rem;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
      text-align: center;
    }
    .product:hover {
      transform: translateY(-5px);
    }
    .product img {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      margin-bottom: 1rem;
      object-fit: contain;
    }
    .product h3 {
      color: #AC8083;
      font-size: 1.2rem;
      margin: 0.5rem 0;
    }
    .product p {
      font-weight: bold;
      color: #333;
      margin-bottom: 1rem;
    }
    .buy-btn {
      margin-top: auto;
      padding: 0.6rem 1rem;
      background-color: #C3989C;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }
    .buy-btn:hover {
      background-color: #561e22;
    }
    footer {
      padding: 40px;
      background: linear-gradient(to bottom, #AC8083, #4e2e2d);
      color: white;
      margin-top: auto;
    }
    .footer-content {
      display: flex;
      gap: 30px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto;
    }
    .footer-section {
      flex: 1;
      min-width: 220px;
    }
    .footer-section h3 {
      margin-bottom: 0.75rem;
      font-size: 1.2rem;
      color: #fff;
    }
    .footer-section p, .footer-section a {
      color: #f0f0f0;
      font-size: 0.95rem;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5rem;
    }
    .footer-bottom {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 1rem;
    }
    @media (max-width: 768px) {
      .nav-toggle { display: block; }
      .nav-links {
        flex-direction: column;
        background-color: #AC8083;
        position: absolute;
        top: 80px;
        right: 0;
        width: 200px;
        border-radius: 0 0 0 10px;
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.3s ease-out;
      }
      .nav-links.show { max-height: 500px; transition: max-height 0.5s ease-in; }
      .nav-links li a { display: block; padding: 15px 20px; }
      .features, .products { flex-direction: column; align-items: center; }
      .footer-content { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="logo">V-Phone</div>
      <nav>
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <ul class="nav-links">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="promotion.html">Promotion</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="filter-section">
      <h2>Filter Products</h2>
      <div class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="gaming">Gaming</button>
        <button data-filter="camera">Camera</button>
        <button data-filter="budget">Budget</button>
      </div>
    </section>

    <section class="product-list" id="product-list"></section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-section"><h3>V-Phone</h3><p>Leading Innovation, Shaping the Future</p></div>
      <div class="footer-section"><h3>Quick Links</h3><a href="index.html">Home</a><a href="products.html">Products</a><a href="promotion.html">Promotion</a><a href="about.html">About Us</a><a href="register.html">Register</a></div>
      <div class="footer-section"><h3>Contact</h3><p>Email: support@vphone.com</p><p>Phone: (021) 1234-5678</p></div>
    </div>
    <div class="footer-bottom">© 2025 V-Phone. All rights reserved.</div>
  </footer>

  <script>
    const productData = [
      { id: 1, name: 'V-Phone Z Pro', category: 'gaming', price: 'Rp. 1.500.000', image: 'phone-2.jpeg' },
      { id: 2, name: 'V-Camera Pro', category: 'camera', price: 'Rp. 3.500.000', image: 'camx.png' },
      { id: 3, name: 'V-Phone Lite', category: 'budget', price: 'Rp. 900.000', image: 'phone-one.png' },
      { id: 4, name: 'V-Phone G5', category: 'gaming', price: 'Rp. 1.200.000', image: 'phone-4.png' },
      { id: 5, name: 'V-Action Cam', category: 'camera', price: 'Rp. 3.200.000', image: 'action-cam.png' },
      { id: 6, name: 'V-Phone Max', category: 'budget', price: 'Rp. 4.000.000', image: 'phone-6.png' }
    ];

    const container = document.getElementById('product-list');
    const filterBtns = document.querySelectorAll('.filters button');

    function renderProducts(filter) {
      if(!container) return;
      container.innerHTML = '';
      const filtered = filter === 'all' ? productData : productData.filter(p => p.category === filter);
      
      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product';
        card.innerHTML = `
          <img src="${p.image}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p>Price: ${p.price}</p>
          <button onclick="window.location.href='register.html'" class="buy-btn">Buy Now</button>
        `;
        container.appendChild(card);
      });
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        filterBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderProducts(e.target.getAttribute('data-filter'));
      });
    });

    renderProducts('all');

    const headerBg = document.querySelector('.header-bg');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 100) { headerBg.classList.add('show'); } 
      else { headerBg.classList.remove('show'); }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const navToggle = document.querySelector('.nav-toggle');
      const navLinks = document.querySelector('.nav-links');
      if(navToggle && navLinks) {
        navToggle.addEventListener('click', () => { navLinks.classList.toggle('show'); });
      }
    });
  </script>
</body>

</html>
