<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V-Phone | Home</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      height: 100%;
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background-color: #FFEBEC;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      z-index: 1000;
      background: linear-gradient(to bottom, #4e2e2d, #FFEBEC);
    }
    .header-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to bottom, #D7A7AA, #4e2e2d);
      border-radius: 0 0 10px 10px;
      transition: opacity 0.3s ease;
      opacity: 0;
      z-index: -1;
    }
    .header-bg.show {
      opacity: 1;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      color: white;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      z-index: 10;
    }
    nav {
      position: relative;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
      z-index: 10;
    }
    .nav-links a {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
      cursor: pointer;
      display: block;
    }
    .nav-links a.active {
      background-color: rgba(93, 52, 55, 0.474);
      font-weight: 700;
      text-decoration: underline;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.5);
      border-radius: 8px;
    }
    .nav-links a:hover {
      background-color: rgba(255, 255, 255, 0.2);
      font-weight: 700;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 2.2rem;
      cursor: pointer;
      z-index: 20;
    }

<body>

    <header>
        <div class="header-bg"></div>

        <div class="header-content">

            <div class="logo">
                V-Phone
            </div>

            <nav>

                <button class="nav-toggle" aria-label="Toggle Navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="promotion.html" class="active">Promotion</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="register.html">Register</a></li>
                </ul>

            </nav>

        </div>
    </header>

    <main>

        <h1 class="section-title">Our Promotions</h1>

        <section class="promotion-list" id="promotion-list">
            <!-- promotion.js -->
        </section>

    </main>

    <footer>

        <div class="footer-content">

            <div class="footer-section">
                <h3>V-Phone</h3>
                <p>Leading Innovation, Shaping the Future.</p>
            </div>

            <div class="footer-section">
                <h3>Quick Links</h3>

                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="promotion.html">Promotion</a>
                <a href="about.html">About Us</a>
                <a href="register.html">Register</a>
            </div>

            <div class="footer-section">

                <h3>Contact Us</h3>

                <p><i class="fa-solid fa-envelope"></i> support@vphone.com</p>
                <p><i class="fa-solid fa-phone"></i> (+62) 21-1234-5678</p>
                <p><i class="fa-solid fa-location-dot"></i> Jakarta, Indonesia</p>

            </div>

        </div>

        <div class="footer-bottom">
            © 2025 V-Phone. All Rights Reserved.
        </div>

    </footer>

    <script src="promotion.js"></script>

    <script>
        const headerBg = document.querySelector('.header-bg');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) {
                headerBg.classList.add('show');
            } else {
                headerBg.classList.remove('show');
            }
        });

        const navToggle = document.querySelector('.nav-toggle');
        const navLinks = document.querySelector('.nav-links');

        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('show');
            navToggle.classList.toggle('active');
        });
    </script>

</body>

</html>
