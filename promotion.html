<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V-Phone | Promotion</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      height: 100%;
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background-color: #FFEBEC;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      z-index: 1000;
      background: linear-gradient(to bottom, #4e2e2d, #FFEBEC);
    }
    .header-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to bottom, #D7A7AA, #4e2e2d);
      border-radius: 0 0 10px 10px;
      transition: opacity 0.3s ease;
      opacity: 0;
      z-index: -1;
    }
    .header-bg.show {
      opacity: 1;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      color: white;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      z-index: 10;
    }
    nav {
      position: relative;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
      z-index: 10;
    }
    .nav-links a {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
      cursor: pointer;
      display: block;
    }
    .nav-links a.active {
      background-color: rgba(93, 52, 55, 0.474);
      font-weight: 700;
      text-decoration: underline;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.5);
      border-radius: 8px;
    }
    .nav-links a:hover {
      background-color: rgba(255, 255, 255, 0.2);
      font-weight: 700;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 2.2rem;
      cursor: pointer;
      z-index: 20;
    }
    main {
      flex: 1;
      padding: 2rem;
      padding-top: 100px;
    }
    .section-title {
      text-align: center;
      color: #AC8083;
      font-size: 2.5rem;
      margin-bottom: 2rem;
    }
    .promotion-list {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
    }
    .promo-card {
      background-color: white;
      border-radius: 15px;
      padding: 1.5rem;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
      text-align: center;
    }
    .promo-card:hover {
      transform: translateY(-5px);
    }
    .promo-card img {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      margin-bottom: 1rem;
      object-fit: contain;
    }
    .promo-card h3 {
      color: #AC8083;
      font-size: 1.2rem;
      margin: 0.5rem 0;
    }
    .promo-card p {
      color: #555;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .buy-btn {
      margin-top: auto;
      padding: 0.6rem 1rem;
      background-color: #C3989C;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }
    .buy-btn:hover {
      background-color: #561e22;
    }
    footer {
      padding: 40px;
      background: linear-gradient(to bottom, #AC8083, #4e2e2d);
      color: white;
      margin-top: auto;
    }
    .footer-content {
      display: flex;
      gap: 30px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto;
    }
    .footer-section {
      flex: 1;
      min-width: 220px;
    }
    .footer-section h3 {
      margin-bottom: 0.75rem;
      font-size: 1.2rem;
      color: #fff;
    }
    .footer-section p, .footer-section a {
      color: #f0f0f0;
      font-size: 0.95rem;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5rem;
    }
    .footer-bottom {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 1rem;
    }
    @media (max-width: 768px) {
      .nav-toggle { display: block; }
      .nav-links {
        flex-direction: column;
        background-color: #AC8083;
        position: absolute;
        top: 80px;
        right: 0;
        width: 200px;
        border-radius: 0 0 0 10px;
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.3s ease-out;
      }
      .nav-links.show { max-height: 500px; transition: max-height 0.5s ease-in; }
      .nav-links li a { display: block; padding: 15px 20px; }
      .features, .promotion-list { flex-direction: column; align-items: center; }
      .footer-content { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-bg"></div>
    <div class="header-content">
      <div class="logo">V-Phone</div>
      <nav>
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="promotion.html" class="active">Promotion</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h2 class="section-title">Our Promotions</h2>
    <section class="promotion-list" id="promo-list"></section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-section footer-left">
        <h3>V-Phone</h3>
        <p>Leading Innovation, Shaping the Future</p>
      </div>
      <div class="footer-section footer-center">
        <h3>Quick Links</h3>
        <a href="products.html">Products</a>
        <a href="promotion.html">Promotion</a>
        <a href="about.html">About Us</a>
        <a href="register.html">Register</a>
      </div>
      <div class="footer-section footer-right">
        <h3>Contact</h3>
        <p>Email: support@vphone.com</p>
        <p>Phone: (021) 1234-5678</p>
      </div>
    </div>
    <div class="footer-bottom">
      © 2025 V-Phone. All rights reserved.
    </div>
  </footer>

  <script>
    const promoData = [
      { id: 1, title: 'Spring Sale 2025', desc: 'Get 20% off on all V-Phone products this spring!', image: 'honor-magic5-pro-banner-pc.png' },
      { id: 2, title: 'Buy One Get One Free', desc: 'Special BOGO offer on V-Phone Lite series until end of May.', image: 'photo-1511707171634-5f897ff02aa9' },
      { id: 3, title: 'Exclusive Launch Offer', desc: 'Be the first to own the latest V-Phone model with exclusive launch discounts!', image: 'photo-1526045612212-70caf35c14df' },
      { id: 4, title: 'Limited Time Discount', desc: 'Grab the newest V-Phone model now with amazing discounts!', image: 'photo-1598327105666-5b89351aff97' }
    ];

    const container = document.getElementById('promo-list');

    function renderPromotions() {
      if(!container) return;
      container.innerHTML = '';
      
      promoData.forEach(p => {
        const card = document.createElement('div');
        card.className = 'promo-card';
        card.innerHTML = `
          <img src="${p.image}" alt="${p.title}">
          <h3>${p.title}</h3>
          <p>${p.desc}</p>
          <button onclick="window.location.href='register.html'" class="buy-btn">Buy Now</button>
        `;
        container.appendChild(card);
      });
    }

    renderPromotions();

    const headerBg = document.querySelector('.header-bg');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 100) { headerBg.classList.add('show'); } 
      else { headerBg.classList.remove('show'); }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const navToggle = document.querySelector('.nav-toggle');
      const navLinks = document.querySelector('.nav-links');
      if(navToggle && navLinks) {
        navToggle.addEventListener('click', () => { navLinks.classList.toggle('show'); });
      }
    });
  </script>
</body>

</html>
