<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>V-Phone | Promotion</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

<style>
body {
  height: 100%;
  margin: 0;
  font-family: 'Cormorant Garamond', serif;
  background-color: #FFEBEC;
  color: #333;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 80px;
  display: flex;
  align-items: center;
  padding: 0 40px;
  box-sizing: border-box;
  z-index: 1000;
  background: linear-gradient(to bottom, #4e2e2d, #FFEBEC);
}

.header-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 80px;
  background: linear-gradient(to bottom, #D7A7AA, #4e2e2d);
  border-radius: 0 0 10px 10px;
  transition: opacity .3s ease;
  opacity: 0;
  z-index: -1;
}

.header-bg.show {
  opacity: 1;
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  color: white;
}

.logo {
  font-size: 2rem;
  font-weight: bold;
  z-index: 10;
}

nav {
  position: relative;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
  z-index: 10;
}

.nav-links a {
  color: #fff;
  font-weight: 600;
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 5px;
  transition: background-color .3s ease;
  cursor: pointer;
  display: block;
}

.nav-links a.active {
  background-color: rgba(93,52,55,.474);
  font-weight: 700;
  text-decoration: underline;
  box-shadow: 0 4px 10px rgba(255,255,255,.5);
  border-radius: 8px;
}

.nav-links a:hover {
  background-color: rgba(255,255,255,.2);
  font-weight: 700;
}

.nav-toggle {
  display: none;
  background: none;
  border: none;
  color: white;
  font-size: 2.2rem;
  cursor: pointer;
  z-index: 20;
}

main {
  flex: 1;
  padding: 2rem;
  padding-top: 100px;
}
/* ===== PROMOTION ===== */

.section-title{
  text-align:center;
  color:#AC8083;
  font-size:40px;
  margin:2rem 0;
}

.promotion-list{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:2rem;
}

.promotion-card{
  background:#fff;
  border-radius:15px;
  width:280px;
  padding:1rem;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
  transition:transform .3s;
  display:flex;
  flex-direction:column;
}

.promotion-card:hover{
  transform:translateY(-5px);
}

.promotion-card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:1rem;
}

.promotion-card h3{
  color:#AC8083;
  font-size:1.3rem;
  margin:.5rem 0;
}

.promotion-card p{
  color:#555;
  margin-bottom:1rem;
}

footer {
  padding:40px;
  background:linear-gradient(to bottom,#AC8083,#4e2e2d);
  color:white;
  margin-top:auto;
}

.footer-content{
  display:flex;
  gap:30px;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  max-width:1200px;
  margin:0 auto;
}

.footer-section{
  flex:1;
  min-width:220px;
}

.footer-section h3{
  margin-bottom:.75rem;
  color:#fff;
}

.footer-section p,
.footer-section a{
  color:#f0f0f0;
  text-decoration:none;
  display:block;
  margin-bottom:.5rem;
}

.footer-bottom{
  text-align:center;
  margin-top:2rem;
  border-top:1px solid rgba(255,255,255,.2);
  padding-top:1rem;
}

@media(max-width:768px){

  .nav-toggle{
    display:block;
  }

  .nav-links{
    flex-direction:column;
    background:#AC8083;
    position:absolute;
    top:80px;
    right:0;
    width:200px;
    border-radius:0 0 0 10px;
    overflow:hidden;
    max-height:0;
    transition:max-height .3s ease-out;
  }

  .nav-links.show{
    max-height:500px;
  }

  .nav-links li a{
    display:block;
    padding:15px 20px;
  }

  .promotion-list{
    flex-direction:column;
    align-items:center;
  }

  .footer-content{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
}
</style>
</head>
<body>
<header>
    <div class="header-bg"></div>

    <div class="header-content">

        <div class="logo">V-Phone</div>

        <nav>

            <button class="nav-toggle" aria-label="Toggle Navigation">
                &#9776;
            </button>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="promotion.html" class="active">Promotion</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>

        </nav>

    </div>

</header>

<main>

    <h1 class="section-title">Our Promotions</h1>

    <section class="promotion-list" id="promotion-list">

    </section>

</main>

<footer>
    <div class="footer-content">
      <div class="footer-section footer-left">
        <h3>V-Phone</h3>
        <p>Leading Innovation, Shaping the Future</p>
      </div>
      <div class="footer-section footer-center">
        <h3>Quick Links</h3>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="promotion.html">Promotion</a>
        <a href="about.html">About Us</a>
        <a href="register.html">Register</a>
      </div>
      <div class="footer-section footer-right">
        <h3>Contact</h3>
        <p>Email: support@vphone.com</p>
        <p>Phone: (021) 1234-5678</p>
      </div>
    </div>
    <div class="footer-bottom">
      © 2025 V-Phone. All rights reserved.
    </div>
  </footer>
<script src="promotion.js"></script>

<script>
const headerBg = document.querySelector(".header-bg");

window.addEventListener("scroll", () => {
    if (window.scrollY > 100) {
        headerBg.classList.add("show");
    } else {
        headerBg.classList.remove("show");
    }
});

document.addEventListener("DOMContentLoaded", () => {
    const navToggle = document.querySelector(".nav-toggle");
    const navLinks = document.querySelector(".nav-links");

    if (navToggle && navLinks) {
        navToggle.addEventListener("click", () => {
            navLinks.classList.toggle("show");
        });
    }
});
</script>

</body>
</html>
